<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEBRIN - Advanced Service System</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        :root { --bg: #0a0a0f; --sur: #12121a; --card: #1a1a26; --bdr: #2a2a3d; --acc: #e8b84b; --txt: #f0eee8; --mut: #8a8a9a; --red: #ff4444; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--txt); font-family: 'DM Sans', sans-serif; }
        .page { display: none; } .page.active { display: block; }
        .tb { padding: 18px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--bdr); background: var(--sur); position: sticky; top: 0; z-index: 100; }
        .mb { padding: 20px; padding-bottom: 100px; max-width: 800px; margin: 0 auto; }
        .scrd { background: var(--card); border: 1px solid var(--bdr); border-radius: 18px; padding: 20px; margin-bottom: 15px; }
        .fi { width: 100%; background: var(--sur); border: 1px solid var(--bdr); border-radius: 12px; padding: 14px; color: var(--txt); margin-top: 10px; outline: none; }
        .bmain { width: 100%; background: linear-gradient(135deg, var(--acc), #c8991f); border: none; border-radius: 12px; padding: 15px; color: #000; font-weight: 700; margin-top: 10px; cursor: pointer; }
        .badge { font-size: 10px; padding: 4px 10px; border-radius: 10px; background: rgba(232,184,75,0.1); color: var(--acc); }
        .bnav { position: fixed; bottom: 0; width: 100%; background: var(--sur); border-top: 1px solid var(--bdr); display: flex; justify-content: space-around; padding: 12px; }
        .nb { background: none; border: none; color: var(--mut); font-size: 12px; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nb.on { color: var(--acc); }
    </style>
</head>
<body>

<div id="pg-auth" class="page active">
    <div style="min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px;">
        <h1 style="font-family:'Playfair Display'; color:var(--acc); font-size:40px">NEBRIN</h1>
        <div class="scrd" style="width:100%; max-width:380px; margin-top:20px">
            <input class="fi" id="eml" type="email" placeholder="Barua Pepe">
            <input class="fi" id="pwd" type="password" placeholder="Nenosiri">
            <button class="bmain" onclick="handleAuth()">Ingia / Jisajili</button>
        </div>
    </div>
</div>

<div id="pg-dash" class="page">
    <div class="tb">
        <div id="user-info" style="font-size:12px; color:var(--acc)">Pakia...</div>
        <button onclick="location.reload()" style="background:none; border:none; color:var(--red)">Toka</button>
    </div>

    <div class="mb">
        <div id="sec-client" style="display:none">
            <h3 style="margin-bottom:15px">Huduma Zetu</h3>
            <div id="client-svcs"></div>
            <hr style="border:0; border-top:1px solid var(--bdr); margin:30px 0">
            <h3>Maombi Yangu & Chat</h3>
            <div id="client-reqs"></div>
        </div>

        <div id="sec-staff" style="display:none">
            <h3 id="staff-title">Maombi ya Idara Yako</h3>
            <div id="staff-jobs"></div>
        </div>

        <div id="sec-admin" style="display:none">
            <h3>Admin: Sajili Mtoa Huduma (Staff)</h3>
            <div class="scrd">
                <input class="fi" id="s-email" placeholder="Email ya Staff">
                <input class="fi" id="s-pass" placeholder="Password">
                <select class="fi" id="s-dept">
                    <option value="TEHAMA">TEHAMA (Tovuti/Software)</option>
                    <option value="SERIKALI">SERIKALI (NIDA/TIN/Passport)</option>
                    <option value="DESIGN">DESIGN (Logo/Mabango)</option>
                </select>
                <button class="bmain" onclick="adminCreateStaff()">Sajili Staff</button>
            </div>
        </div>
    </div>
</div>

<script>
const SB_URL = "https://oguukuhflamwmgrbdqfk.supabase.co";
const SB_KEY = "sb_publishable_DfUyGsd9bdFBJmouRZf5Rw_SQBnUYXE";
const sb = supabase.createClient(SB_URL, SB_KEY);

let currUser = null;
let profile = null;

const HUDUMA = [
    { name: "Uundaji wa Tovuti", dept: "TEHAMA" },
    { name: "NIDA Online", dept: "SERIKALI" },
    { name: "Graphic Design", dept: "DESIGN" },
    { name: "Vyeti vya Kuzaliwa", dept: "SERIKALI" }
];

async function handleAuth() {
    const email = document.getElementById('eml').value;
    const password = document.getElementById('pwd').value;
    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    
    if (error) {
        // Ikiwa huna akaunti, jisajili
        const { data: up, error: err2 } = await sb.auth.signUp({ email, password });
        if (err2) return alert(err2.message);
        alert("Akaunti imeundwa! Ingia sasa.");
    } else {
        loadApp(data.user);
    }
}

async function loadApp(user) {
    currUser = user;
    const { data: prof } = await sb.from('profiles').select('*').eq('id', user.id).single();
    
    if (!prof) {
        const newProf = { id: user.id, email: user.email, role: 'client' };
        await sb.from('profiles').insert([newProf]);
        profile = newProf;
    } else {
        profile = prof;
    }

    document.getElementById('pg-auth').classList.remove('active');
    document.getElementById('pg-dash').classList.add('active');
    document.getElementById('user-info').innerText = `${profile.email} (${profile.role})`;

    if (profile.role === 'admin') {
        document.getElementById('sec-admin').style.display = 'block';
    } else if (profile.role === 'staff') {
        document.getElementById('sec-staff').style.display = 'block';
        document.getElementById('staff-title').innerText = `Maombi ya Idara: ${profile.department}`;
        loadStaffJobs();
    } else {
        document.getElementById('sec-client').style.display = 'block';
        renderClientSvcs();
        loadClientReqs();
    }
}

// CLIENT LOGIC
function renderClientSvcs() {
    document.getElementById('client-svcs').innerHTML = HUDUMA.map(h => `
        <div class="scrd">
            <h4>${h.name}</h4>
            <textarea class="fi" id="msg-${h.name.replace(/\s/g, '')}" placeholder="Andika maelezo hapa..."></textarea>
            <button class="bmain" onclick="clientSendReq('${h.name}', '${h.dept}')">Tuma Ombi</button>
        </div>
    `).join('');
}

async function clientSendReq(name, dept) {
    const msg = document.getElementById(`msg-${name.replace(/\s/g, '')}`).value;
    await sb.from('maombi').insert([{
        user_email: profile.email,
        huduma_name: name,
        department: dept,
        maelezo: msg,
        reply: "Asante! Staff wa idara ya " + dept + " amepokea ombi lako."
    }]);
    alert("Ombi limetumwa!");
    loadClientReqs();
}

async function loadClientReqs() {
    const { data } = await sb.from('maombi').select('*').eq('user_email', profile.email).order('tarehe', {ascending: false});
    document.getElementById('client-reqs').innerHTML = data.map(r => `
        <div class="scrd">
            <div style="display:flex; justify-content:space-between"><b>${r.huduma_name}</b> <span class="badge">${r.status}</span></div>
            <div style="margin-top:10px; font-size:13px; color:var(--mut)">Maelezo yako: ${r.maelezo}</div>
            <div style="margin-top:5px; padding:10px; background:var(--sur); border-radius:8px; color:var(--acc)">NEBRIN: ${r.reply || 'Inashughulikiwa...'}</div>
        </div>
    `).join('');
}

// STAFF LOGIC
async function loadStaffJobs() {
    const { data } = await sb.from('maombi').select('*').eq('department', profile.department);
    document.getElementById('staff-jobs').innerHTML = data.map(r => `
        <div class="scrd">
            <p>Mteja: ${r.user_email}</p>
            <p>Huduma: ${r.huduma_name}</p>
            <p style="background:var(--sur); padding:10px; margin:10px 0">${r.maelezo}</p>
            <input class="fi" id="rep-${r.id}" placeholder="Jibu mteja hapa...">
            <button class="bmain" onclick="staffReply('${r.id}')">Tuma Jibu</button>
        </div>
    `).join('');
}

async function staffReply(id) {
    const val = document.getElementById(`rep-${id}`).value;
    await sb.from('maombi').update({ reply: val, status: 'Imekamilika' }).eq('id', id);
    alert("Jibu limetumwa!");
    loadStaffJobs();
}

// ADMIN LOGIC
async function adminCreateStaff() {
    const email = document.getElementById('s-email').value;
    const pass = document.getElementById('s-pass').value;
    const dept = document.getElementById('s-dept').value;
    
    const { data, error } = await sb.auth.signUp({ email, password: pass });
    if (error) return alert(error.message);

    await sb.from('profiles').update({ role: 'staff', department: dept }).eq('id', data.user.id);
    alert("Staff amesajiliwa katika idara ya " + dept);
}
</script>
</body>
</html>
