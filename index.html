<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEBRIN Online Service</title>
<link rel="manifest" href="./manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<style>
:root { --bg: #0a0a0f; --sur: #12121a; --card: #1a1a26; --bdr: #2a2a3d; --acc: #e8b84b; --txt: #f0eee8; --mut: #8a8a9a; --red: #ff4444; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--txt); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
.page { display: none; } .page.active { display: block; animation: fadeIn 0.4s ease; }
.sub-page { display: none; } .sub-page.active { display: block; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* UI ELEMENTS */
.awrap { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; background: radial-gradient(circle at top, #1a1000 0%, #0a0a0f 70%); }
.logo-box { width: 80px; height: 80px; background: var(--acc); border-radius: 20px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; box-shadow: 0 0 30px rgba(232,184,75,0.3); }
.fcard { background: var(--card); border: 1px solid var(--bdr); border-radius: 22px; padding: 25px; width: 100%; max-width: 380px; }
.fi { width: 100%; background: var(--sur); border: 1px solid var(--bdr); border-radius: 12px; padding: 14px; color: var(--txt); margin-top: 10px; outline: none; }
.bmain { width: 100%; background: linear-gradient(135deg, var(--acc), #c8991f); border: none; border-radius: 12px; padding: 15px; color: #000; font-weight: 700; margin-top: 20px; cursor: pointer; }

/* CHAT/MESSAGE STYLE */
.msg-box { background: rgba(232,184,75,0.05); border: 1px dashed var(--acc); border-radius: 10px; padding: 10px; margin-top: 10px; font-size: 13px; }
.reply-box { background: var(--sur); border-left: 3px solid var(--acc); padding: 8px; margin-top: 10px; border-radius: 4px; font-style: italic; color: var(--acc); }

.tb { padding: 18px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--bdr); background: var(--sur); position: sticky; top: 0; z-index: 100; }
.mb { padding: 20px; padding-bottom: 100px; max-width: 800px; margin: 0 auto; }
.scrd { background: var(--card); border: 1px solid var(--bdr); border-radius: 18px; padding: 20px; margin-bottom: 15px; }
.bnav { position: fixed; bottom: 0; width: 100%; background: var(--sur); border-top: 1px solid var(--bdr); display: flex; justify-content: space-around; padding: 12px; }
.nb { background: none; border: none; color: var(--mut); font-size: 12px; display: flex; flex-direction: column; align-items: center; gap: 6px; }
.nb.on { color: var(--acc); }
</style>
</head>
<body>

<div id="pg-auth" class="page active">
    <div class="awrap">
        <div class="logo-box"><span style="font-size:40px">🌐</span></div>
        <div class="fcard">
            <h2 style="font-family:'Playfair Display'; color:var(--acc)">NEBRIN Login</h2>
            <input class="fi" id="eml" type="email" placeholder="Barua Pepe">
            <input class="fi" id="pwd" type="password" placeholder="Nenosiri">
            <button class="bmain" onclick="doSubmit()">Ingia</button>
        </div>
    </div>
</div>

<div id="pg-dash" class="page">
    <div class="tb">
        <div style="font-family:'Playfair Display'; color:var(--acc); font-weight:900">NEBRIN</div>
        <button onclick="location.reload()" style="background:none; border:none; color:var(--red)">Toka</button>
    </div>

    <div id="sub-home" class="sub-page active">
        <div class="mb">
            <h3 style="margin-bottom:20px">Huduma Zetu</h3>
            <div id="svclst"></div>
        </div>
    </div>

    <div id="sub-reqs" class="sub-page">
        <div class="mb">
            <h3 style="margin-bottom:20px">Maombi & Chat</h3>
            <div id="my-req-list"></div>
        </div>
    </div>

    <div class="bnav">
        <button class="nb on" id="btn-home" onclick="navTo('home')"><span>🏠</span><span>Nyumbani</span></button>
        <button class="nb" id="btn-reqs" onclick="navTo('reqs')"><span>📋</span><span>Maombi</span></button>
    </div>
</div>

<script>
const SB_URL = "https://oguukuhflamwmgrbdqfk.supabase.co";
const SB_KEY = "sb_publishable_DfUyGsd9bdFBJmouRZf5Rw_SQBnUYXE";
const sb = supabase.createClient(SB_URL, SB_KEY);
let userEmail = "";

const SVCS = [
    {id:1, name:"Uundaji wa Tovuti", desc:"Eleza aina ya tovuti unayohitaji."},
    {id:4, name:"NIDA Online", desc:"Tuma namba yako ya simu au jina kamili hapa."},
    {id:16, name:"CCTV & Security", desc:"Taja eneo unalotaka kufunga kamera."}
];

function navTo(p) {
    document.querySelectorAll('.sub-page, .nb').forEach(el => el.classList.remove('active', 'on'));
    if(p === 'home') { document.getElementById('sub-home').classList.add('active'); document.getElementById('btn-home').classList.add('on'); }
    else { document.getElementById('sub-reqs').classList.add('active'); document.getElementById('btn-reqs').classList.add('on'); fetchMyRequests(); }
}

async function doSubmit() {
    const email = document.getElementById("eml").value;
    const password = document.getElementById("pwd").value;
    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    if(error) return alert(error.message);
    userEmail = data.user.email;
    document.getElementById("pg-auth").classList.remove("active");
    document.getElementById("pg-dash").classList.add("active");
    renderSvcs();
}

function renderSvcs() {
    document.getElementById("svclst").innerHTML = SVCS.map(s => `
        <div class="scrd">
            <h4 style="color:var(--acc)">${s.name}</h4>
            <p style="font-size:12px; color:var(--mut); margin-bottom:10px">${s.desc}</p>
            <textarea class="fi" id="msg-${s.id}" placeholder="Andika maelezo yako hapa kwa mtoa huduma..." style="height:80px; font-size:13px"></textarea>
            <button class="bmain" onclick="sendRequest('${s.name}', ${s.id})">Tuma Ombi na Maelezo</button>
        </div>
    `).join('');
}

async function sendRequest(h, id) {
    const message = document.getElementById(`msg-${id}`).value;
    if(!message) return alert("Tafadhali andika maelezo kidogo kabla ya kutuma.");

    const { error } = await sb.from('maombi').insert([{ 
        user_email: userEmail, 
        huduma_name: h,
        maelezo: message,
        reply: "Asante kwa ombi lako! Mtoa huduma wetu amepokea maelezo yako na atakujibu hivi punde."
    }]);

    if(error) alert(error.message); 
    else { alert("Ombi na maelezo yametumwa!"); document.getElementById(`msg-${id}`).value = ""; }
}

async function fetchMyRequests() {
    const list = document.getElementById("my-req-list");
    const { data, error } = await sb.from('maombi').select('*').eq('user_email', userEmail).order('tarehe', { ascending: false });
    if(error) return;

    list.innerHTML = data.map(r => `
        <div class="scrd">
            <div style="display:flex; justify-content:space-between">
                <span style="color:var(--acc); font-weight:700">${r.huduma_name}</span>
                <span style="font-size:10px; opacity:0.6">${new Date(r.tarehe).toLocaleDateString()}</span>
            </div>
            <div class="msg-box"><strong>Maelezo yako:</strong><br>${r.maelezo || 'Hakuna maelezo.'}</div>
            <div class="reply-box"><strong>NEBRIN:</strong><br>${r.reply || 'Inasubiri majibu...'}</div>
        </div>
    `).join('');
}
</script>
</body>
</html>
