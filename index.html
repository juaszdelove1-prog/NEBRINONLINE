<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEBRIN Online Service</title>

<meta name="theme-color" content="#0a0a0f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="NEBRIN">
<link rel="manifest" href="./manifest.json">
<link rel="icon" type="image/png" href="icon-512.png">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<style>
/* 1. KURUDISHA UAMINIFU WA CSS (Rangi na Glow) */
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0f;--sur:#12121a;--card:#1a1a26;--bdr:#2a2a3d;--acc:#e8b84b;--txt:#f0eee8;--mut:#8a8a9a;--grn:#27ae60;--red:#c0392b;--r:14px}
body{background:var(--bg);color:var(--txt);font-family:'DM Sans',sans-serif;min-height:100vh}

/* Animations na Glow */
@keyframes pulse{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.08)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}

/* PAGE STYLES */
.page{display:none}.page.active{display:block;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* AUTH WRAP (Glow Effect) */
.awrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:linear-gradient(160deg,#150900,#0a0a0f 55%,#00101a);position:relative;overflow:hidden}
.awrap::before{content:'';position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(232,184,75,.1),transparent 65%);top:50%;left:50%;transform:translate(-50%,-50%);animation:pulse 5s ease-in-out infinite;pointer-events:none}

/* KURUDISHA MAANDISHI YA DHAHABU (Playfair Display) */
.alogo{text-align:center;margin-bottom:28px}
.aname{font-family:'Playfair Display',serif;font-size:36px;font-weight:900;background:linear-gradient(135deg,var(--acc),#fff 60%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.atag{color:var(--mut);font-size:11px;letter-spacing:3px;text-transform:uppercase}

/* KURUDISHA KADI ZA MTEJA/MTOA HUDUMA */
.rolesw{display:flex;gap:10px;margin-bottom:24px;width:100%;max-width:400px}
.rbtn{flex:1;padding:12px;border-radius:10px;border:2px solid var(--bdr);background:var(--card);color:var(--mut);font-weight:600;cursor:pointer;transition:all .2s;text-align:center}
.rbtn .ri{font-size:20px;display:block;margin-bottom:3px}
.rbtn.on{border-color:var(--acc);color:var(--acc);background:rgba(232,184,75,0.07);box-shadow:0 0 15px rgba(232,184,75,0.2)}

/* KURUDISHA FCARD NA INPUTS ZA MWANZO */
.fcard{background:var(--card);border:1px solid var(--bdr);border-radius:18px;padding:24px;width:100%;max-width:400px;animation:fadeUp .4s ease}
.ftitle{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;margin-bottom:4px}
.fsub{color:var(--mut);font-size:13px;margin-bottom:22px}
.fg{margin-bottom:14px}
.fl{display:block;font-size:10px;font-weight:600;color:var(--mut);margin-bottom:5px;text-transform:uppercase;letter-spacing:1px}
.fi{width:100%;background:var(--sur);border:1.5px solid var(--bdr);border-radius:10px;padding:12px;color:var(--txt);outline:none;transition:all 0.2s}
.fi:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(232,184,75,0.1)}

/* KURUDISHA KITUFE CHA MWANZO NA GLOW */
.bmain{width:100%;background:linear-gradient(135deg,var(--acc),#c8991f);border:none;border-radius:10px;padding:13px;color:#0a0a0f;font-weight:700;cursor:pointer;margin-top:10px;transition:all .2s}
.bmain:hover{transform:translateY(-2px);box-shadow:0 10px 24px rgba(232,184,75,0.28)}
.bmain:disabled{opacity:0.5;cursor:not-allowed;transform:none}

/* Alert na Link */
.al{padding:10px;border-radius:8px;font-size:13px;margin-bottom:13px;display:none;border:1px solid}
.al.on{display:block}
.al.err{background:rgba(192,57,43,0.1);color:#e74c3c;border-color:rgba(192,57,43,0.3)}
.sw{text-align:center;margin-top:14px;font-size:13px;color:var(--mut)}
.sw a{color:var(--acc);cursor:pointer;font-weight:600;text-decoration:underline;text-underline-offset:3px}
.sp{width:14px;height:14px;border:2px solid rgba(0,0,0,0.2);border-top-color:#000;border-radius:50%;animation:spin .6s linear infinite;display:inline-block;margin-right:8px;vertical-align:middle}

/* DASHBOARD STYLES (Zilizokuwepo mwanzo) */
.tb{background:var(--sur);border-bottom:1px solid var(--bdr);padding:14px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
.tbn{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--acc)}
.mb{padding:20px;max-width:800px;margin:0 auto;padding-bottom:80px}
.sclist{display:flex;flex-direction:column;gap:12px}
.scrd{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:18px}
.breq{background:var(--acc);border:none;border-radius:7px;padding:8px 15px;color:#0a0a0f;font-weight:700;cursor:pointer;font-size:12px}
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--sur);border-top:1px solid var(--bdr);display:flex;justify-content:space-around;padding:10px}
.nb{background:none;border:none;color:var(--mut);font-size:11px;cursor:pointer}
.nb.on{color:var(--acc)}
</style>
</head>
<body>

<div id="pg-auth" class="page active">
    <div class="awrap">
        <div class="alogo">
            <div class="aname">NEBRIN</div>
            <div class="atag">Online Service Company</div>
        </div>
        
        <div class="rolesw">
            <button class="rbtn on" id="rb-client" onclick="selRoleUI('client')">
                <span class="ri">👤</span>Mteja
            </button>
            <button class="rbtn" id="rb-staff" onclick="selRoleUI('staff')">
                <span class="ri">👨‍💼</span>Mtoa Huduma
            </button>
        </div>

        <div class="fcard">
            <h1 class="ftitle" id="ftitle">Karibu tena</h1>
            <p class="fsub" id="fsub">Ingia kama Mteja kuendelea</p>
            <div id="alrt" class="al"></div>
            <div class="fg">
                <label class="fl">Barua Pepe</label>
                <input class="fi" id="eml" type="email" placeholder="jina@mfano.com">
            </div>
            <div class="fg">
                <label class="fl">Nenosiri</label>
                <input class="fi" id="pwd" type="password" placeholder="••••••••">
            </div>
            <button class="bmain" id="bsub" onclick="doSubmit()">Ingia</button>
            <div class="sw" id="swbot">
                <span>Huna akaunti?</span> <a onclick="setAuthMode('signup')">Jiandikishe</a>
            </div>
        </div>
    </div>
</div>

<div id="pg-client" class="page">
    <div class="tb">
        <div class="tbn">NEBRIN</div>
        <button class="nb" style="color:var(--red); font-size:12px;" onclick="location.reload()">Toka</button>
    </div>
    <div class="mb">
        <h3 style="font-family:'Playfair Display',serif; color:var(--acc); margin-bottom:15px">Huduma Zinazopatikana (16)</h3>
        <div class="sclist" id="svclst"></div>
    </div>
    <div class="bnav">
        <button class="nb on">🏠 Nyumbani</button>
        <button class="nb">📋 Maombi Yangu</button>
    </div>
</div>

<script>
// CONFIG SUPABASE
const SB_URL = "https://oguukuhflamwmgrbdqfk.supabase.co";
const SB_KEY = "sb_publishable_DfUyGsd9bdFBJmouRZf5Rw_SQBnUYXE";
const sb = supabase.createClient(SB_URL, SB_KEY);

let authMode = "login";
let currentRole = "client";

const SVCS = [
    {id:1, name:"Uundaji wa Tovuti", desc:"Tovuti za kitaalamu zinazovutia wateja kwa biashara yako."},
    {id:2, name:"E-Commerce", desc:"Duka la kidijitali lenye mfumo wa malipo na usimamizi wa bidhaa."},
    {id:3, name:"Vyeti vya Kuzaliwa", desc:"Msaada wa kupata cheti cha kuzaliwa haraka (Siku 3)."},
    {id:4, name:"NIDA Online", desc:"Usajili na ufuatiliaji wa namba ya NIDA mtandaoni."},
    {id:5, name:"Laini za Uwakala", desc:"Usajili wa laini za uwakala kwa mitandao yote ya simu."},
    {id:16, name:"CCTV & Security", desc:"Ufungaji wa kamera za usalama na uzio wa umeme."}
    // Unaweza kuongeza huduma nyingine hapa...
];

function selRoleUI(role) {
    currentRole = role;
    document.getElementById("rb-client").classList.toggle("on", role === 'client');
    document.getElementById("rb-staff").classList.toggle("on", role === 'staff');
    if(authMode === "login") {
        document.getElementById("fsub").innerText = role === 'client' ? "Ingia kama Mteja kuendelea" : "Ingia kama Mtoa Huduma";
    }
}

function setAuthMode(mode) {
    authMode = mode;
    document.getElementById("ftitle").innerText = mode === "login" ? "Karibu tena" : "Unda Akaunti";
    document.getElementById("fsub").innerText = mode === "login" ? (currentRole === 'client' ? "Ingia kama Mteja" : "Ingia kama Mtoa Huduma") : "Jiunge na NEBRIN leo";
    document.getElementById("bsub").innerText = mode === "login" ? "Ingia" : "Jisajili";
    document.getElementById("swbot").innerHTML = mode === "login" 
        ? 'Huna akaunti? <a onclick="setAuthMode(\'signup\')">Jiandikishe</a>' 
        : 'Tayari una akaunti? <a onclick="setAuthMode(\'login\')">Ingia</a>';
}

// 2. KODI INAYOFANYA KITUFE CHA 'INGIA' KIFANYE KAZI
async function doSubmit() {
    const email = document.getElementById("eml").value.trim();
    const password = document.getElementById("pwd").value;
    const btn = document.getElementById("bsub");
    const alrt = document.getElementById("alrt");

    if(!email || !password) return;

    btn.disabled = true;
    btn.innerHTML = '<span class="sp"></span> Inapakia...';
    alrt.style.display = "none";

    try {
        let res;
        if(authMode === "login") {
            res = await sb.auth.signInWithPassword({ email, password });
        } else {
            res = await sb.auth.signUp({ email, password });
        }

        if(res.error) throw res.error;

        if(authMode === "signup") {
            alert("Akaunti imeundwa! Angalia barua pepe yako ili kuthibitisha.");
            location.reload();
        } else {
            showDashboard();
        }
    } catch(e) {
        alrt.innerText = e.message;
        alrt.className = "al on err";
        btn.disabled = false;
        btn.innerHTML = authMode === "login" ? "Ingia" : "Jisajili";
    }
}

function showDashboard() {
    document.getElementById("pg-auth").classList.remove("active");
    document.getElementById("pg-client").classList.add("active");
    renderSvcs();
}

function renderSvcs() {
    const container = document.getElementById("svclst");
    container.innerHTML = SVCS.map(s => `
        <div class="scrd">
            <h4 style="font-family:'Playfair Display',serif; color:var(--acc); margin-bottom:5px;">${s.name}</h4>
            <p style="color:var(--mut); font-size:13px; margin-bottom:10px;">${s.desc}</p>
            <button class="breq" onclick="alert('Ombi lako la ${s.name} limepokelewa!')">Omba Huduma</button>
        </div>
    `).join('');
}

// 3. USALAMA NA PWA (Toleo Sahihi)
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('NEBRIN SW Registered!'))
      .catch(err => console.error('SW Registration Failed:', err));
  });
}
</script>
</body>
</html>
