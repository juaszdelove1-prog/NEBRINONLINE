<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEBRIN</title>
<meta name="theme-color" content="#0a0a0f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NEBRIN">

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-512.png">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
/* ... (Style zako zote zipo hapa, hazijabadilika) ... */
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0f;--sur:#12121a;--card:#1a1a26;--bdr:#2a2a3d;--acc:#e8b84b;--txt:#f0eee8;--mut:#8a8a9a;--grn:#27ae60;--red:#c0392b;--r:14px}
body{background:var(--bg);color:var(--txt);font-family:'DM Sans',sans-serif;min-height:100vh}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.08)}}

.page{display:none}.page.active{display:block;animation:fadeIn .3s ease}
.sub{display:none}.sub.active{display:block;animation:fadeIn .25s ease}

/* AUTH */
.awrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:linear-gradient(160deg,#150900,#0a0a0f 55%,#00101a);position:relative;overflow:hidden}
.awrap::before{content:'';position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(232,184,75,.1),transparent 65%);top:50%;left:50%;transform:translate(-50%,-50%);animation:pulse 5s ease-in-out infinite;pointer-events:none}
.alogo{text-align:center;margin-bottom:28px;position:relative;z-index:1}
.aicon{width:72px;height:72px;background:linear-gradient(135deg,var(--acc),#f0c96e);border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:34px;margin:0 auto 14px;box-shadow:0 16px 40px rgba(232,184,75,.3);animation:float 3s ease-in-out infinite}
.aname{font-family:'Playfair Display',serif;font-size:36px;font-weight:900;background:linear-gradient(135deg,var(--acc),#fff 60%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.atag{color:var(--mut);font-size:11px;letter-spacing:3px;text-transform:uppercase;margin-top:5px}

.rolesw{display:flex;gap:10px;margin-bottom:24px;width:100%;max-width:400px;position:relative;z-index:1}
.rbtn{flex:1;padding:12px 8px;border-radius:10px;border:2px solid var(--bdr);background:var(--card);color:var(--mut);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;text-align:center}
.rbtn .ri{font-size:20px;display:block;margin-bottom:3px}
.rbtn.on{border-color:var(--acc);color:var(--acc);background:rgba(232,184,75,.07)}

.fcard{background:var(--card);border:1px solid var(--bdr);border-radius:18px;padding:24px 20px;width:100%;max-width:400px;position:relative;z-index:1;animation:fadeUp .4s ease}
.ftitle{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;margin-bottom:4px}
.fsub{color:var(--mut);font-size:13px;margin-bottom:22px}
.fg{margin-bottom:14px}
.fl{display:block;font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--mut);margin-bottom:5px}
.fi{width:100%;background:var(--sur);border:1.5px solid var(--bdr);border-radius:10px;padding:12px 14px;color:var(--txt);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:all .2s}
.fi:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(232,184,75,.1)}
.fi::placeholder{color:var(--mut)}
.pwrap{position:relative}
.pwrap .fi{padding-right:44px}
.ebtn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--mut);font-size:16px;padding:4px;line-height:1}
.ebtn:hover{color:var(--acc)}
.bmain{width:100%;background:linear-gradient(135deg,var(--acc),#c8991f);border:none;border-radius:10px;padding:13px;color:#0a0a0f;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;margin-top:5px}
.bmain:hover{transform:translateY(-2px);box-shadow:0 10px 24px rgba(232,184,75,.28)}
.bmain:disabled{opacity:.5;cursor:not-allowed;transform:none}
.sw{text-align:center;margin-top:14px;font-size:13px;color:var(--mut)}
.sw a{color:var(--acc);cursor:pointer;font-weight:600;text-decoration:underline;text-underline-offset:3px}
.al{padding:10px 13px;border-radius:8px;font-size:13px;margin-bottom:13px;border:1px solid;display:none}
.al.on{display:block}
.al.err{background:rgba(192,57,43,.1);border-color:rgba(192,57,43,.3);color:#e74c3c}
.al.ok{background:rgba(39,174,96,.1);border-color:rgba(39,174,96,.3);color:#2ecc71}
.div{display:flex;align-items:center;gap:10px;margin:14px 0}
.dl{flex:1;height:1px;background:var(--bdr)}
.dt{font-size:10px;color:var(--mut);letter-spacing:1px;text-transform:uppercase}
.sp{width:15px;height:15px;border:2px solid rgba(0,0,0,.2);border-top-color:#0a0a0f;border-radius:50%;animation:spin .6s linear infinite;display:inline-block;vertical-align:middle;margin-right:6px}

/* TOPBAR */
.tb{background:var(--sur);border-bottom:1px solid var(--bdr);padding:0 14px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.tbl{display:flex;align-items:center;gap:8px}
.tbi{width:30px;height:30px;background:linear-gradient(135deg,var(--acc),#f0c96e);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px}
.tbn{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;background:linear-gradient(135deg,var(--acc),#fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.tbr{display:flex;align-items:center;gap:8px}
.ubadge{display:flex;align-items:center;gap:7px;background:var(--card);border:1px solid var(--bdr);border-radius:100px;padding:4px 11px 4px 5px}
.uav{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0}
.uav-c{background:linear-gradient(135deg,var(--acc),var(--red))}
.uav-s{background:linear-gradient(135deg,#2980b9,#8e44ad)}
.uem{font-size:10px;color:var(--mut);max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rtag{font-size:9px;padding:2px 7px;border-radius:100px;font-weight:600}
.rtag-s{background:rgba(41,128,185,.15);color:#3498db;border:1px solid rgba(41,128,185,.25)}
.rtag-c{background:rgba(232,184,75,.12);color:var(--acc);border:1px solid rgba(232,184,75,.2)}
.bout{background:rgba(192,57,43,.1);border:1px solid rgba(192,57,43,.2);color:#e74c3c;padding:6px 11px;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}
.bout:hover{background:rgba(192,57,43,.2)}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--sur);border-top:1px solid var(--bdr);z-index:200;padding:5px 0 8px;display:flex;justify-content:space-around}
.nb{display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;color:var(--mut);font-family:'DM Sans',sans-serif;font-size:10px;font-weight:500;padding:5px 8px;cursor:pointer;transition:all .2s;flex:1}
.ni{font-size:20px}
.nb.on{color:var(--acc)}

/* BODY */
.mb{padding:18px 14px 80px;max-width:860px;margin:0 auto}
.wbanner{background:linear-gradient(135deg,#1a1200,var(--card) 60%,#001018);border:1px solid var(--bdr);border-radius:var(--r);padding:22px;margin-bottom:18px;position:relative;overflow:hidden}
.wbanner::before{content:'✦';position:absolute;right:18px;top:50%;transform:translateY(-50%);font-size:70px;opacity:.05;color:var(--acc)}
.wlbl{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--acc);font-weight:600;margin-bottom:6px}
.wtitle{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;margin-bottom:5px}
.wsub{color:var(--mut);font-size:13px}
.sgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:18px}
.sbox{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:16px;transition:all .25s}
.sbox:hover{border-color:var(--acc);transform:translateY(-2px)}
.sico{font-size:22px;margin-bottom:10px}
.sval{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--acc);margin-bottom:2px}
.slbl{color:var(--mut);font-size:11px}
.sectit{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.sectit::after{content:'';flex:1;height:1px;background:var(--bdr)}

/* ... (Baki ya style zako...) ... */
</style>
</head>
<body>

<script>
// ... (Kodi zako za Supabase na Logics...)

// MPYA: LOGIC YA USAKINISHAJI (INSTALL APP)
let deferredPrompt;
const installBanner = document.getElementById('pwab');

window.addEventListener('beforeinstallprompt', (e) => {
  // Zuia browser isionyeshe banner lake la kienyeji
  e.preventDefault();
  deferredPrompt = e;
  
  // Onyesha banner letu zuri la NEBRIN baada ya sekunde 4
  if(!localStorage.getItem("pwa_dismissed")) {
    setTimeout(() => {
      if(installBanner) installBanner.classList.add('on');
    }, 4000);
  }
});

async function instPWA() {
  if (deferredPrompt) {
    // Onyesha lile box la "Install" la simu/browser
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    console.log(`User response to the install prompt: ${outcome}`);
    deferredPrompt = null;
    if(installBanner) installBanner.classList.remove('on');
  } else {
    // Kama tayari ameshasakinisha au browser haina uwezo huo
    let msg = "📱 Maelekezo ya kusakinisha:\n\n";
    msg += "🍎 iPhone: Bonyeza 'Share' (mshale juu), kisha 'Add to Home Screen'.\n\n";
    msg += "🤖 Android: Bonyeza menu (⋮) juu, kisha 'Install App' au 'Add to Home Screen'.";
    alert(msg);
  }
}

function dismPWA() {
  if(installBanner) installBanner.classList.remove('on');
  localStorage.setItem("pwa_dismissed", "true");
}

// Sajili Service Worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('Service Worker: Registered'))
      .catch(err => console.log('Service Worker: Error:', err));
  });
}

// Hakikisha unaita appInit() mwishoni
function appInit(){
  // ... (Logics zako za awali)
}
appInit();
</script>
</body>
</html>
