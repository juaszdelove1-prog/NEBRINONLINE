<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEBRIN Online Service</title>
<link rel="manifest" href="./manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<style>
/* KURUDISHA MUONEKANO WA ASILI (GOLD & DARK) */
:root{--bg:#0a0a0f;--sur:#12121a;--card:#1a1a26;--bdr:#2a2a3d;--acc:#e8b84b;--txt:#f0eee8;--mut:#8a8a9a}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:'DM Sans',sans-serif;min-height:100vh}

.page{display:none}.page.active{display:block;animation:fadeIn 0.3s ease}
.sub-page{display:none}.sub-page.active{display:block}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* GLOWING LOGO STYLE */
.logo-box{width:80px;height:80px;background:var(--acc);border-radius:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;box-shadow:0 0 30px rgba(232,184,75,0.3)}
.logo-icon{font-size:45px}

.awrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;background:radial-gradient(circle at top, #1a1000 0%, #0a0a0f 70%)}
.aname{font-family:'Playfair Display',serif;font-size:32px;font-weight:900;color:var(--acc);letter-spacing:2px;text-align:center}
.atag{color:var(--mut);font-size:10px;letter-spacing:3px;text-transform:uppercase;margin-bottom:30px;text-align:center}

/* KURUDISHA KADI ZA MTEJA/MTOA HUDUMA */
.rolesw{display:flex;gap:10px;margin-bottom:20px;width:100%;max-width:380px}
.rbtn{flex:1;padding:15px;border-radius:12px;border:1px solid var(--bdr);background:var(--card);color:var(--mut);cursor:pointer;text-align:center}
.rbtn.on{border-color:var(--acc);background:rgba(232,184,75,0.05);color:var(--acc)}

.fcard{background:var(--card);border:1px solid var(--bdr);border-radius:20px;padding:25px;width:100%;max-width:380px}
.fi{width:100%;background:var(--sur);border:1px solid var(--bdr);border-radius:10px;padding:14px;color:var(--txt);margin-top:12px;outline:none}
.bmain{width:100%;background:linear-gradient(135deg,var(--acc),#c8991f);border:none;border-radius:12px;padding:15px;color:#000;font-weight:700;margin-top:20px;cursor:pointer}

/* DASHBOARD & NAVIGATION */
.tb{padding:15px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--bdr)}
.mb{padding:20px;padding-bottom:100px}
.scrd{background:var(--card);border:1px solid var(--bdr);border-radius:15px;padding:20px;margin-bottom:15px}
.status-pill{font-size:10px;padding:4px 10px;border-radius:20px;background:rgba(232,184,75,0.1);color:var(--acc)}

.bnav{position:fixed;bottom:0;width:100%;background:var(--sur);border-top:1px solid var(--bdr);display:flex;justify-content:space-around;padding:15px}
.nb{background:none;border:none;color:var(--mut);font-size:12px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:5px}
.nb.on{color:var(--acc)}
</style>
</head>
<body>

<div id="pg-auth" class="page active">
    <div class="awrap">
        <div class="logo-box"><span class="logo-icon">🌐</span></div>
        <div class="aname">NEBRIN</div>
        <div class="atag">Online Service Company</div>
        
        <div class="rolesw">
            <div class="rbtn on">Mteja</div>
            <div class="rbtn">Mtoa Huduma</div>
        </div>

        <div class="fcard">
            <h2 style="font-family:'Playfair Display'">Karibu tena</h2>
            <p style="color:var(--mut); font-size:13px; margin-bottom:10px">Ingia kuendelea na huduma</p>
            <input class="fi" id="eml" type="email" placeholder="Barua Pepe">
            <input class="fi" id="pwd" type="password" placeholder="Nenosiri">
            <button class="bmain" onclick="doSubmit()">Ingia</button>
        </div>
    </div>
</div>

<div id="pg-dash" class="page">
    <div class="tb">
        <div style="font-family:'Playfair Display'; color:var(--acc); font-weight:900">NEBRIN</div>
        <button onclick="location.reload()" style="background:none; border:none; color:#ff4444">Toka</button>
    </div>

    <div id="sub-home" class="sub-page active">
        <div class="mb">
            <h3 style="margin-bottom:20px; font-family:'Playfair Display'">Huduma Zetu</h3>
            <div id="svclst"></div>
        </div>
    </div>

    <div id="sub-reqs" class="sub-page">
        <div class="mb">
            <h3 style="margin-bottom:20px; font-family:'Playfair Display'">Maombi Yangu</h3>
            <div id="my-req-list"></div>
        </div>
    </div>

    <div class="bnav">
        <button class="nb on" id="btn-home" onclick="navTo('home')">🏠 Nyumbani</button>
        <button class="nb" id="btn-reqs" onclick="navTo('reqs')">📋 Maombi Yangu</button>
    </div>
</div>

<script>
const SB_URL = "https://oguukuhflamwmgrbdqfk.supabase.co";
const SB_KEY = "sb_publishable_DfUyGsd9bdFBJmouRZf5Rw_SQBnUYXE";
const sb = supabase.createClient(SB_URL, SB_KEY);
let userEmail = "";

const SVCS = [
    {id:1, name:"Uundaji wa Tovuti", desc:"Tovuti za kitaalamu kwa biashara yako."},
    {id:2, name:"E-Commerce", desc:"Duka la kidijitali lenye mfumo wa malipo."},
    {id:4, name:"Usajili wa NIDA", desc:"Ufuatiliaji wa namba ya NIDA mtandaoni."},
    {id:16, name:"CCTV & Security", desc:"Ufungaji wa kamera za usalama."}
];

function navTo(p) {
    document.querySelectorAll('.sub-page, .nb').forEach(el=>el.classList.remove('active','on'));
    if(p==='home'){ document.getElementById('sub-home').classList.add('active'); document.getElementById('btn-home').classList.add('on'); }
    else { document.getElementById('sub-reqs').classList.add('active'); document.getElementById('btn-reqs').classList.add('on'); fetchMyRequests(); }
}

async function doSubmit() {
    const email = document.getElementById("eml").value;
    const password = document.getElementById("pwd").value;
    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    if(error) return alert(error.message);
    userEmail = data.user.email;
    document.getElementById("pg-auth").classList.remove("active");
    document.getElementById("pg-dash").classList.add("active");
    renderSvcs();
}

function renderSvcs() {
    document.getElementById("svclst").innerHTML = SVCS.map(s => `
        <div class="scrd">
            <h4 style="color:var(--acc)">${s.name}</h4>
            <p style="font-size:12px; color:var(--mut); margin:8px 0">${s.desc}</p>
            <button onclick="sendRequest('${s.name}')" style="background:var(--acc); border:none; padding:8px 15px; border-radius:8px; font-weight:700; cursor:pointer">Omba Sasa</button>
        </div>
    `).join('');
}

async function sendRequest(h) {
    const { error } = await sb.from('maombi').insert([{ user_email: userEmail, huduma_name: h }]);
    if(error) alert(error.message); else alert("Ombi la " + h + " limepokelewa!");
}

async function fetchMyRequests() {
    const list = document.getElementById("my-req-list");
    const { data, error } = await sb.from('maombi').select('*').eq('user_email', userEmail).order('tarehe', { ascending: false });
    if(error) return;
    list.innerHTML = data.length ? data.map(r => `
        <div class="scrd">
            <div style="display:flex; justify-content:space-between; align-items:center">
                <span style="color:var(--acc); font-weight:700">${r.huduma_name}</span>
                <span class="status-pill">${r.status}</span>
            </div>
            <p style="font-size:11px; color:var(--mut); margin-top:10px">Tarehe: ${new Date(r.tarehe).toLocaleDateString()}</p>
        </div>
    `).join('') : "<p style='text-align:center; color:var(--mut)'>Huna maombi.</p>";
}
</script>
</body>
</html>
